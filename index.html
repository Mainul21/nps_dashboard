<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPS Dashboard — Customer Sentiment Analytics</title>
  <meta name="description" content="Real-time Net Promoter Score dashboard with interactive charts, filters, and customer sentiment tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <!-- <link rel="stylesheet" href="/css/styles.css" /> -->
</head>
<body>

  <!-- ═══════════ HEADER ═══════════ -->
  <header id="app-header">
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-icon">
          <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="url(#lg)" stroke-width="2"/><path d="M9 14.5L12.5 18L19 11" stroke="url(#lg)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs></svg>
        </div>
        <div>
          <h1>NPS Dashboard</h1>
          <p class="subtitle">Customer Sentiment Analytics</p>
        </div>
      </div>
      <div class="header-badge" id="live-badge">
        <span class="pulse"></span> Live
      </div>
    </div>
  </header>

  <main id="dashboard">

    <!-- ═══════════ METRIC CARDS ═══════════ -->
    <section class="metrics-row" id="metrics-section" aria-label="Key Metrics">
      <div class="metric-card accent-purple" id="card-nps">
        <span class="metric-label">NPS Score</span>
        <span class="metric-value" id="metric-nps">—</span>
        <span class="metric-sub" id="metric-nps-sub"></span>
      </div>
      <div class="metric-card accent-blue" id="card-avg">
        <span class="metric-label">Avg Score</span>
        <span class="metric-value" id="metric-avg">—</span>
      </div>
      <div class="metric-card accent-teal" id="card-total">
        <span class="metric-label">Total Responses</span>
        <span class="metric-value" id="metric-total">0</span>
      </div>
      <div class="metric-card accent-green" id="card-promoters">
        <span class="metric-label">Promoters</span>
        <span class="metric-value" id="metric-promoters">0</span>
        <span class="metric-sub">(Score 9–10)</span>
      </div>
      <div class="metric-card accent-red" id="card-detractors">
        <span class="metric-label">Detractors</span>
        <span class="metric-value" id="metric-detractors">0</span>
        <span class="metric-sub">(Score 0–6)</span>
      </div>
    </section>

    <!-- ═══════════ FILTERS ═══════════ -->
    <section class="filters-bar" id="filters-section" aria-label="Filters">
      <div class="filter-group">
        <label for="filter-year">Year</label>
        <select id="filter-year"><option value="">All Years</option></select>
      </div>
      <div class="filter-group">
        <label for="filter-month">Month</label>
        <select id="filter-month"><option value="">All Months</option></select>
      </div>
      <div class="filter-group">
        <label for="filter-account">Account</label>
        <select id="filter-account"><option value="">All Accounts</option></select>
      </div>
      <button class="btn-reset" id="btn-reset-filters">Reset Filters</button>
    </section>

    <!-- ═══════════ CHARTS ═══════════ -->
    <section class="charts-row" id="charts-section" aria-label="Charts">
      <div class="chart-card wide">
        <h2>Monthly Breakdown</h2>
        <canvas id="chart-bar"></canvas>
      </div>
      <div class="chart-card narrow">
        <h2>Overall Distribution</h2>
        <canvas id="chart-donut"></canvas>
      </div>
    </section>

    <!-- ═══════════ TABLE ═══════════ -->
    <section class="table-section" id="table-section" aria-label="Records Table">
      <h2>All Responses</h2>
      <div class="table-wrap">
        <table id="data-table">
          <thead>
            <tr>
              <th>Account Name</th>
              <th>Score</th>
              <th>Response</th>
              <th>Month</th>
              <th>Year</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- rows injected by JS -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <footer id="app-footer">
    <p>&copy; 2025 NPS Dashboard &bull; Data refreshes every 5 seconds</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
